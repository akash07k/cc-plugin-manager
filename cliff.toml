# git-cliff configuration -- generates CHANGELOG.md and release notes from
# Conventional Commits. Used by .github/workflows/release.yml on every v* tag.
#
# Reference: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/),
and this project adheres to [Semantic Versioning](https://semver.org/).
"""

# Per-version section.
#  - Heading: ## [1.2.3] - YYYY-MM-DD     (or "Unreleased" for HEAD)
#  - Groups (Added, Fixed, ...) are derived from `commit_parsers` below.
#  - Each commit becomes a bullet, with the scope rendered bold if present.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}
"""

trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# Map commit prefixes to changelog sections. Order matters: the first matching
# rule wins. `skip = true` drops the commit silently.
commit_parsers = [
  { message = "^feat",                 group = "Added" },
  { message = "^fix",                  group = "Fixed" },
  { message = "^perf",                 group = "Performance" },
  { message = "^refactor",             group = "Changed" },
  { message = "^docs",                 group = "Documentation" },
  { message = "^test",                 group = "Tests" },
  { message = "^chore\\(release\\):",  skip = true },
  { message = "^chore\\(deps\\)",      group = "Dependencies" },
  { message = "^chore",                skip = true },
  { message = "^style",                skip = true },
  { message = "^ci",                   group = "CI" },
  { message = "^build",                group = "Build" },
  { message = "^revert",               group = "Reverted" },
  { body    = ".*BREAKING CHANGE",     group = "Breaking" },
  { message = ".*",                    group = "Other" },
]

# Only consider tags that look like semver releases (vX.Y.Z, v1.2.0-rc.1).
tag_pattern = "v[0-9].*"
filter_commits = false
topo_order = false
sort_commits = "oldest"
